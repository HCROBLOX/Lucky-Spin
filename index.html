  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f3f5f9;
      color: #222;
      position: relative;
    }

    .share-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px 16px;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 15;
    }

    .share-btn:hover {
      border-color: #1976d2;
      color: #1976d2;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 360px;
      padding-top: 50px;
    }

    .wheel-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      background: linear-gradient(135deg, #f7f9ff, #eef2ff);
      position: relative;
    }

    .wheel-wrap {
      position: relative;
      width: min(78vw, 560px);
      height: min(78vw, 560px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.18),
        inset 0 0 0 8px #ffffff;
      transition: transform 5s cubic-bezier(0.12, 0.75, 0.18, 1);
      background: white;
    }

    .pointer {
      position: absolute;
      right: -22px;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 24px solid transparent;
      border-bottom: 24px solid transparent;
      border-right: 46px solid #f44336;
      z-index: 5;
      filter: drop-shadow(0 4px 5px rgba(0,0,0,0.25));
    }

    .center-button {
      position: absolute;
      width: 118px;
      height: 118px;
      border-radius: 50%;
      border: 8px solid white;
      background: #ffffff;
      color: #333;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
      z-index: 4;
      transition: 0.2s;
    }

    .center-button:hover {
      transform: scale(1.05);
    }

    .center-button:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
    }

    .side-panel {
      background: #ffffff;
      border-left: 1px solid #ddd;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: -4px 0 18px rgba(0,0,0,0.06);
    }

    .panel-title {
      font-size: 22px;
      font-weight: 800;
      color: #222;
    }

    .stats {
      display: flex;
      gap: 10px;
    }

    .stat-box {
      flex: 1;
      background: #f4f6fb;
      border: 1px solid #e4e8f0;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 800;
      color: #1976d2;
    }

    .stat-label {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .small-btn {
      padding: 10px 8px;
      border: none;
      border-radius: 8px;
      background: #eef2ff;
      color: #1d3b8b;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .small-btn:hover {
      background: #dfe7ff;
    }

    textarea {
      width: 100%;
      flex: 1;
      min-height: 260px;
      resize: none;
      border: 1px solid #d8dce5;
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
      line-height: 1.5;
      outline: none;
    }

    textarea:focus {
      border-color: #4285f4;
      box-shadow: 0 0 0 3px rgba(66,133,244,0.15);
    }

    .spin-main {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1976d2;
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }

    .spin-main:hover {
      background: #0d63b7;
    }

    .spin-main:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .result-list {
      background: #f8fafc;
      border: 1px solid #e4e8f0;
      border-radius: 10px;
      padding: 12px;
      min-height: 80px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 14px;
    }

    .result-title {
      font-weight: 800;
      margin-bottom: 8px;
    }

    .result-item {
      padding: 6px 0;
      border-bottom: 1px solid #e6e8ef;
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .hint {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 20;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: min(92vw, 420px);
      background: white;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: pop 0.25s ease;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .winner-label { color: #666; font-size: 16px; margin-bottom: 8px; }
    .winner-name { font-size: 32px; font-weight: 900; color: #1976d2; margin-bottom: 22px; word-break: break-word; }
    .share-label { font-size: 15px; color: #555; margin-bottom: 10px; text-align: left; }
    .share-link-box { display: flex; gap: 8px; margin-bottom: 18px; }
    .share-link { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: #f8f9fa; }
    .copy-btn { padding: 10px 16px; border: none; border-radius: 8px; background: #1976d2; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .copy-btn:hover { background: #0d63b7; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-btn { flex: 1; border: none; border-radius: 9px; padding: 12px; font-weight: 800; cursor: pointer; }
    .remove-btn { background: #ffebee; color: #c62828; }
    .close-btn { background: #eef2ff; color: #1d3b8b; }

    @media (max-width: 850px) {
      .app { grid-template-columns: 1fr; padding-top: 60px; }
      .wheel-area { padding: 24px 18px; }
      .side-panel { border-left: none; border-top: 1px solid #ddd; }
      .wheel-wrap { width: min(88vw, 420px); height: min(88vw, 420px); }
      .center-button { width: 90px; height: 90px; font-size: 18px; border-width: 6px; }
      .pointer { right: -14px; border-top-width: 18px; border-bottom-width: 18px; border-right-width: 36px; }
      textarea { min-height: 220px; }
      .share-btn { top: 12px; right: 12px; font-size: 13px; padding: 7px 14px; }
    }
  </style>
</head>

<body>
  <button class="share-btn" onclick="openShareModal()">🔗 Chia sẻ</button>

  <div class="app">
    <main class="wheel-area">
      <div class="wheel-wrap">
        <canvas id="wheelCanvas" width="900" height="900"></canvas>
        <div class="pointer"></div>
        <button class="center-button" id="centerBtn" onclick="spinWheel()">Quay</button>
      </div>
    </main>

    <aside class="side-panel">
      <div class="panel-title">Vòng quay may mắn</div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-number" id="entryCount">0</div>
          <div class="stat-label">Mục</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="resultCount">0</div>
          <div class="stat-label">Kết quả</div>
        </div>
      </div>

      <div class="action-row">
        <button class="small-btn" onclick="shuffleEntries()">Tráo đổi</button>
        <button class="small-btn" onclick="sortEntries()">Sắp xếp</button>
        <button class="small-btn" onclick="clearEntries()">Xóa</button>
      </div>

      <textarea id="entriesInput" placeholder="Nhập mỗi giải thưởng trên một dòng..."></textarea>

      <button class="spin-main" id="spinBtn" onclick="spinWheel()">QUAY NGAY</button>

      <div class="result-list">
        <div class="result-title">Kết quả đã quay</div>
        <div id="resultsBox">Chưa có kết quả nào.</div>
      </div>

      <div class="hint">
        Mẹo: bạn có thể chia sẻ link bằng cách bấm vào nút chia sẻ.
      </div>
    </aside>
  </div>

  <div class="modal" id="winnerModal">
    <div class="modal-box">
      <div class="winner-label">Kết quả là</div>
      <div class="winner-name" id="winnerName"></div>
      <div class="modal-actions">
        <button class="modal-btn remove-btn" onclick="removeWinner()">Xóa khỏi vòng</button>
        <button class="modal-btn close-btn" onclick="closeModal()">Đóng</button>
      </div>
    </div>
  </div>

  <div class="modal" id="shareModal">
    <div class="modal-box">
      <div class="panel-title" style="margin-bottom:15px;">🔗 Chia sẻ vòng quay</div>
      <div class="share-label">Link này mở đúng danh sách giải thưởng của bạn:</div>
      <div class="share-link-box">
        <div class="share-link" id="shareLink"></div>
        <button class="copy-btn" onclick="copyShareLink()">Sao chép</button>
      </div>
      <button class="modal-btn close-btn" style="width:100%;" onclick="closeShareModal()">Đóng</button>
    </div>
  </div>

  <script>
    // ====================== CẤU HÌNH ======================
    const THOI_GIAN_QUAY = 5200;
    // =======================================================

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const input = document.getElementById("entriesInput");
    const entryCount = document.getElementById("entryCount");
    const resultCount = document.getElementById("resultCount");
    const resultsBox = document.getElementById("resultsBox");
    const spinBtn = document.getElementById("spinBtn");
    const centerBtn = document.getElementById("centerBtn");
    const winnerModal = document.getElementById("winnerModal");
    const winnerName = document.getElementById("winnerName");
    const shareModal = document.getElementById("shareModal");
    const shareLink = document.getElementById("shareLink");

    let entries = [];
    let results = [];
    let currentRotation = 0;
    let isSpinning = false;
    let lastWinnerIndex = null;
    let audioCtx = null;
    let quayInterval = null;

    const colors = [
      "#3366CC", "#DC3912", "#FF9900", "#109618",
      "#990099", "#0099C6", "#DD4477", "#66AA00",
      "#B82E2E", "#316395", "#994499", "#22AA99"
    ];

    const STORAGE_KEY = "wheel_may_man_data";

    function saveToLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        entries: input.value,
        results: results
      }));
    }

    function loadFromLocal() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          input.value = data.entries || "";
          results = data.results || [];
          updateResults();
        } catch (e) {
          input.value = "";
        }
      } else {
        input.value = [
          "Giải nhất", "Giải nhì", "Giải ba", "Giải tư",
          "Voucher 50k", "Voucher 100k", "Quà tặng", "Thử lại"
        ].join("\n");
      }
    }

    function generateShareLink() {
      const listText = input.value.trim();
      if (!listText) return window.location.href;
      const encoded = btoa(unescape(encodeURIComponent(listText)));
      const baseUrl = window.location.origin + window.location.pathname;
      return `${baseUrl}?list=${encoded}`;
    }

    function loadFromShareLink() {
      const params = new URLSearchParams(window.location.search);
      const listParam = params.get("list");
      if (listParam) {
        try {
          const decoded = decodeURIComponent(escape(atob(listParam)));
          input.value = decoded;
          results = [];
          updateResults();
        } catch (e) {}
      }
    }

    function openShareModal() {
      shareLink.textContent = "Đang tạo link...";
      const link = generateShareLink();
      shareLink.textContent = link;
      shareModal.classList.add("show");
    }

    function closeShareModal() {
      shareModal.classList.remove("show");
    }

    function copyShareLink() {
      const linkText = shareLink.textContent;
      navigator.clipboard.writeText(linkText)
        .then(() => alert("✅ Đã sao chép link thành công!"))
        .catch(() => alert("❌ Không thể sao chép, vui lòng sao chép tay nhé"));
    }

    function updateEntries() {
      entries = input.value
        .split("\n")
        .map(item => item.trim())
        .filter(item => item.length > 0);
      entryCount.textContent = entries.length;
      drawWheel();
      saveToLocal();
    }

    function drawWheel() {
      const size = canvas.width;
      const center = size / 2;
      const radius = size / 2 - 18;
      ctx.clearRect(0, 0, size, size);

      if (entries.length === 0) {
        ctx.beginPath();
        ctx.arc(center, center, radius, 0, Math.PI * 2);
        ctx.fillStyle = "#e5e7eb";
        ctx.fill();
        ctx.fillStyle = "#666";
        ctx.font = "bold 42px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Nhập danh sách", center, center);
        return;
      }

      const slice = (Math.PI * 2) / entries.length;
      entries.forEach((text, index) => {
        const startAngle = index * slice;
        const endAngle = startAngle + slice;
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = colors[index % colors.length];
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(startAngle + slice / 2);
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#ffffff";
        ctx.font = getFontSize(entries.length) + "px Arial";
        ctx.shadowColor = "rgba(0,0,0,0.35)";
        ctx.shadowBlur = 3;
        const displayText = shortenText(text, entries.length > 12 ? 14 : 22);
        ctx.fillText(displayText, radius - 36, 0);
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(center, center, radius, 0, Math.PI * 2);
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 14;
      ctx.stroke();
    }

    function getFontSize(count) {
      if (count <= 8) return 34;
      if (count <= 14) return 28;
      if (count <= 24) return 22;
      return 16;
    }

    function shortenText(text, max) {
      return text.length > max ? text.slice(0, max) + "..." : text;
    }

    function secureRandomInt(max) {
      const array = new Uint32Array(1);
      crypto.getRandomValues(array);
      return array[0] % max;
    }

    // ========== ÂM THANH BẢN GỐC BAN ĐẦU ==========
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playQuaySound() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = 880 + Math.random() * 200;
      gain.gain.value = 0.15;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.08);
    }

    function playKetQuaSound() {
      initAudio();
      [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        gain.gain.value = 0.18;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const start = audioCtx.currentTime + i * 0.15;
        osc.start(start);
        osc.stop(start + 0.2);
      });
    }

    document.addEventListener('click', initAudio, { once: true });

    function spinWheel() {
      if (isSpinning || entries.length === 0) return;
      isSpinning = true;
      spinBtn.disabled = true;
      centerBtn.disabled = true;

      quayInterval = setInterval(playQuaySound, 180);

      const winnerIndex = secureRandomInt(entries.length);
      lastWinnerIndex = winnerIndex;
      const segmentDeg = 360 / entries.length;
      const segmentCenterDeg = winnerIndex * segmentDeg + segmentDeg / 2;
      const targetRotation = (360 - segmentCenterDeg) % 360;
      const currentMod = ((currentRotation % 360) + 360) % 360;
      const extraToTarget = (targetRotation - currentMod + 360) % 360;
      const fullSpins = 6 + secureRandomInt(4);
      currentRotation += fullSpins * 360 + extraToTarget;
      canvas.style.transitionDuration = `${THOI_GIAN_QUAY}ms`;
      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        isSpinning = false;
        spinBtn.disabled = false;
        centerBtn.disabled = false;
        clearInterval(quayInterval);
        playKetQuaSound();

        const winner = entries[winnerIndex];
        results.unshift(winner);
        updateResults();
        winnerName.textContent = winner;
        winnerModal.classList.add("show");
      }, THOI_GIAN_QUAY);
    }

    function updateResults() {
      resultCount.textContent = results.length;
      resultsBox.innerHTML = results.length === 0 
        ? "Chưa có kết quả nào." 
        : results.map((item, i) => `<div class="result-item">${i+1}. ${escapeHTML(item)}</div>`).join("");
      saveToLocal();
    }

    function shuffleEntries() {
      if (entries.length <= 1) r
