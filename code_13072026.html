<!DOCTYPE html>

<head>

  <meta name="keywords" content="vòng quay may mắn, quay số trúng thưởng, tạo vòng quay, vòng quay giải thưởng, công cụ quay số" />

  <!-- CHIA SẺ MXH -->

  <meta name="twitter:title" content="Vòng Quay May Mắn Miễn Phí" />
  <meta name="twitter:description" content="Tạo vòng quay giải thưởng ngay, chia sẻ cho bạn bè, âm thanh sống động." />

  <style>
    * {box-sizing: border-box;margin: 0;padding: 0;font-family: Arial, Helvetica, sans-serif;}
    body {min-height: 100vh;background: #f3f5f9;color: #222;position: relative;}
    .share-btn {position: absolute;top: 16px;right: 16px;padding: 8px 16px;background: #fff;border: 1px solid #ddd;border-radius: 20px;font-size: 14px;font-weight: 600;color: #333;cursor: pointer;transition: 0.2s;z-index: 15;}
    .share-btn:hover {border-color: #1976d2;color: #1976d2;transform: translateY(-1px);box-shadow: 0 2px 8px rgba(0,0,0,0.08);}
    .app {min-height: 100vh;display: grid;grid-template-columns: 1fr 360px;padding-top: 50px;}
    .wheel-area {display: flex;align-items: center;justify-content: center;padding: 30px;background: linear-gradient(135deg, #f7f9ff, #eef2ff);position: relative;}
    .wheel-wrap {position: relative;width: min(78vw, 560px);height: min(78vw, 560px);display: flex;align-items: center;justify-content: center;}
    #wheelCanvas {width: 100%;height: 100%;border-radius: 50%;box-shadow: 0 18px 40px rgba(0,0,0,0.18), inset 0 0 0 8px #fff;transition: transform 5s cubic-bezier(0.12,0.75,0.18,1);background: #fff;}
    .pointer {position: absolute;right: -22px;top: 50%;transform: translateY(-50%);width: 0;height: 0;border-top: 24px solid transparent;border-bottom: 24px solid transparent;border-right: 46px solid #f44336;z-index: 5;filter: drop-shadow(0 4px 5px rgba(0,0,0,0.25));}
    .center-button {position: absolute;width: 118px;height: 118px;border-radius: 50%;border: 8px solid #fff;background: #fff;color: #333;font-size: 22px;font-weight: 800;cursor: pointer;box-shadow: 0 8px 18px rgba(0,0,0,0.22);z-index: 4;transition: 0.2s;}
    .center-button:hover {transform: scale(1.05);}
    .center-button:disabled {opacity: 0.75;cursor: not-allowed;transform: none;}
    .side-panel {background: #fff;border-left: 1px solid #ddd;padding: 18px;display: flex;flex-direction: column;gap: 14px;box-shadow: -4px 0 18px rgba(0,0,0,0.06);}
    .panel-title {font-size: 22px;font-weight: 800;color: #222;}
    .stats {display: flex;gap: 10px;}
    .stat-box {flex: 1;background: #f4f6fb;border: 1px solid #e4e8f0;border-radius: 10px;padding: 12px;text-align: center;}
    .stat-number {font-size: 24px;font-weight: 800;color: #1976d2;}
    .stat-label {font-size: 13px;color: #666;margin-top: 2px;}
    .action-row {display: grid;grid-template-columns: repeat(3,1fr);gap: 8px;}
    .small-btn {padding: 10px 8px;border: none;border-radius: 8px;background: #eef2ff;color: #1d3b8b;font-weight: 700;cursor: pointer;transition: 0.2s;}
    .small-btn:hover {background: #dfe7ff;}
    textarea {width: 100%;flex: 1;min-height: 260px;resize: none;border: 1px solid #d8dce5;border-radius: 10px;padding: 12px;font-size: 16px;line-height: 1.5;outline: none;}
    textarea:focus {border-color: #4285f4;box-shadow: 0 0 0 3px rgba(66,133,244,0.15);}
    .spin-main {width: 100%;padding: 14px;border: none;border-radius: 10px;background: #1976d2;color: #fff;font-size: 18px;font-weight: 800;cursor: pointer;transition: 0.2s;}
    .spin-main:hover {background: #0d63b7;}
    .spin-main:disabled {background: #aaa;cursor: not-allowed;}
    .result-list {background: #f8fafc;border: 1px solid #e4e8f0;border-radius: 10px;padding: 12px;min-height: 80px;max-height: 150px;overflow-y: auto;font-size: 14px;}
    .result-title {font-weight: 800;margin-bottom: 8px;}
    .result-item {padding: 6px 0;border-bottom: 1px solid #e6e8ef;}
    .result-item:last-child {border-bottom: none;}
    .modal {position: fixed;inset: 0;background: rgba(0,0,0,0.45);display: none;align-items: center;justify-content: center;padding: 20px;z-index: 20;}
    .modal.show {display: flex;}
    .modal-box {width: min(92vw,420px);background: #fff;border-radius: 18px;padding: 28px;text-align: center;box-shadow: 0 20px 60px rgba(0,0,0,0.3);animation: pop 0.25s ease;}
    @keyframes pop {from {opacity: 0;transform: scale(0.85);}to {opacity: 1;transform: scale(1);}}
    .winner-label {color: #666;font-size: 16px;margin-bottom: 8px;}
    .winner-name {font-size: 32px;font-weight: 900;color: #1976d2;margin-bottom: 22px;word-break: break-word;}
    .share-link-box {display: flex;gap: 8px;margin-bottom: 18px;}
    .share-link {flex: 1;padding: 10px;border: 1px solid #ddd;border-radius: 8px;font-size: 13px;text-align: left;overflow: hidden;text-overflow: ellipsis;white-space: nowrap;background: #f8f9fa;}
    .copy-btn {padding: 10px 16px;border: none;border-radius: 8px;background: #1976d2;color: #fff;font-weight: 600;cursor: pointer;transition: 0.2s;}
    .copy-btn:hover {background: #0d63b7;}
    .modal-actions {display: flex;gap: 10px;}
    .modal-btn {flex: 1;border: none;border-radius: 9px;padding: 12px;font-weight: 800;cursor: pointer;}
    .remove-btn {background: #ffebee;color: #c62828;}
    .close-btn {background: #eef2ff;color: #1d3b8b;}
    @media (max-width:850px) {.app {grid-template-columns: 1fr;padding-top: 60px;}.wheel-area {padding: 24px 18px;}.side-panel {border-left: none;border-top: 1px solid #ddd;}.wheel-wrap {width: min(88vw,420px);height: min(88vw,420px);}.center-button {width: 90px;height: 90px;font-size: 18px;border-width: 6px;}.pointer {right: -14px;border-top-width: 18px;border-bottom-width: 18px;border-right-width: 36px;}textarea {min-height: 220px;}.share-btn {top: 12px;right: 12px;font-size: 13px;padding: 7px 14px;}}
  </style>
</head>
<body>
  <button class="share-btn" onclick="openShareModal()">🔗 Chia sẻ</button>
  <div class="app">
    <main class="wheel-area">
      <div class="wheel-wrap">
        <canvas id="wheelCanvas" width="900" height="900"></canvas>
        <div class="pointer"></div>
        <button class="center-button" id="centerBtn" onclick="spinWheel()">Quay</button>
      </div>
    </main>
    <aside class="side-panel">
      <div class="panel-title">Vòng quay may mắn</div>
      <div class="stats">
        <div class="stat-box"><div class="stat-number" id="entryCount">0</div><div class="stat-label">Mục</div></div>
        <div class="stat-box"><div class="stat-number" id="resultCount">0</div><div class="stat-label">Kết quả</div></div>
      </div>
      <div class="action-row">
        <button class="small-btn" onclick="shuffleEntries()">Tráo đổi</button>
        <button class="small-btn" onclick="sortEntries()">Sắp xếp</button>
        <button class="small-btn" onclick="clearEntries()">Xóa</button>
      </div>
      <textarea id="entriesInput" placeholder="Nhập mỗi giải thưởng trên một dòng..."></textarea>
      <button class="spin-main" id="spinBtn" onclick="spinWheel()">QUAY NGAY</button>
      <div class="result-list">
        <div class="result-title">Kết quả đã quay</div>
        <div id="resultsBox">Chưa có kết quả nào.</div>
      </div>
    </aside>
  </div>
  <div class="modal" id="winnerModal">
    <div class="modal-box">
      <div class="winner-label">Kết quả là</div>
      <div class="winner-name" id="winnerName"></div>
      <div class="modal-actions">
        <button class="modal-btn remove-btn" onclick="removeWinner()">Xóa khỏi vòng</button>
        <button class="modal-btn close-btn" onclick="closeModal()">Đóng</button>
      </div>
    </div>
  </div>
  <div class="modal" id="shareModal">
    <div class="modal-box">
      <div class="panel-title" style="margin-bottom:15px;">🔗 Chia sẻ vòng quay</div>
      <div class="share-label">Link này mở đúng danh sách giải thưởng của bạn:</div>
      <div class="share-link-box">
        <div class="share-link" id="shareLink"></div>
        <button class="copy-btn" onclick="copyShareLink()">Sao chép</button>
      </div>
      <button class="modal-btn close-btn" style="width:100%;" onclick="closeShareModal()">Đóng</button>
    </div>
  </div>

  <script>
    const THOI_GIAN_QUAY = 5200;
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const input = document.getElementById("entriesInput");
    const entryCount = document.getElementById("entryCount");
    const resultCount = document.getElementById("resultCount");
    const resultsBox = document.getElementById("resultsBox");
    const spinBtn = document.getElementById("spinBtn");
    const centerBtn = document.getElementById("centerBtn");
    const winnerModal = document.getElementById("winnerModal");
    const winnerName = document.getElementById("winnerName");
    const shareModal = document.getElementById("shareModal");
    const shareLink = document.getElementById("shareLink");

    let entries = [], results = [], currentRotation = 0, isSpinning = false, lastWinnerIndex = null, audioCtx = null, quayInterval = null;
    const colors = ["#3366CC","#DC3912","#FF9900","#109618","#990099","#0099C6","#DD4477","#66AA00","#B82E2E","#316395","#994499","#22AA99"];
    const STORAGE_KEY = "wheel_may_man_data";

    function saveToLocal() {localStorage.setItem(STORAGE_KEY, JSON.stringify({entries: input.value, results: results}));}
    function loadFromLocal() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved) try{const d=JSON.parse(saved);input.value=d.entries||"";results=d.results||[];updateResults();}catch(e){input.value="";}
      else input.value=["Giải nhất","Giải nhì","Giải ba","Giải tư","Voucher 50k","Voucher 100k","Quà tặng","Thử lại"].join("\n");
    }
    function generateShareLink() {
      const t=input.value.trim();if(!t)return window.location.href;
      const e=btoa(unescape(encodeURIComponent(t)));
      return `${window.location.origin}${window.location.pathname}?list=${e}`;
    }
    function loadFromShareLink() {
      const p=new URLSearchParams(window.location.search);
      const l=p.get("list");if(l)try{input.value=decodeURIComponent(escape(atob(l)));results=[];updateResults();}catch(e){}
    }
    function openShareModal() {shareLink.textContent="Đang tạo link...";shareLink.textContent=generateShareLink();shareModal.classList.add("show");}
    function closeShareModal() {shareModal.classList.remove("show");}
    function copyShareLink() {navigator.clipboard.writeText(shareLink.textContent).then(()=>alert("✅ Đã sao chép link!")).catch(()=>alert("❌ Không thể sao chép, vui lòng sao chép tay"));}
    function updateEntries() {entries=input.value.split("\n").map(i=>i.trim()).filter(i=>i.length>0);entryCount.textContent=entries.length;drawWheel();saveToLocal();}
    function drawWheel() {
      const s=canvas.width,c=s/2,r=s/2-18;ctx.clearRect(0,0,s,s);
      if(entries.length===0){ctx.beginPath();ctx.arc(c,c,r,0,Math.PI*2);ctx.fillStyle="#e5e7eb";ctx.fill();ctx.fillStyle="#666";ctx.font="bold 42px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("Nhập danh sách",c,c);return;}
      const sl=(Math.PI*2)/entries.length;
      entries.forEach((t,i)=>{
        const st=i*sl,en=st+sl;ctx.beginPath();ctx.moveTo(c,c);ctx.arc(c,c,r,st,en);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=4;ctx.stroke();
        ctx.save();ctx.translate(c,c);ctx.rotate(st+sl/2);ctx.textAlign="right";ctx.textBaseline="middle";ctx.fillStyle="#fff";ctx.font=getFontSize(entries.length)+"px Arial";ctx.shadowColor="rgba(0,0,0,0.35)";ctx.shadowBlur=3;ctx.fillText(shortenText(t,entries.length>12?14:22),r-36,0);ctx.restore();
      });
      ctx.beginPath();ctx.arc(c,c,r,0,Math.PI*2);ctx.strokeStyle="#fff";ctx.lineWidth=14;ctx.stroke();
    }
    function getFontSize(n){if(n<=8)return 34;if(n<=14)return 28;if(n<=24)return 22;return 16;}
    function shortenText(t,m){return t.length>m?t.slice(0,m)+"...":t;}
    function secureRandomInt(m){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%m;}
    function initAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();}
    function playQuaySound(){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.value=880+Math.random()*200;g.gain.value=0.15;o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.08);}
    function playKetQuaSound(){initAudio();[523.25,659.25,783.99,1046.5].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="triangle";o.frequency.value=f;g.gain.value=0.18;o.connect(g);g.connect(audioCtx.destination);const st=audioCtx.currentTime+i*0.15;o.start(st);o.stop(st+0.2);});}
    document.addEventListener("click",initAudio,{once:true});
    function spinWheel(){
      if(isSpinning||entries.length===0)return;isSpinning=true;spinBtn.disabled=true;centerBtn.disabled=true;quayInterval=setInterval(playQuaySound,180);
      const w=secureRandomInt(entries.length);lastWinnerIndex=w;
      const dg=360/entries.length,ct=w*dg+dg/2,tg=(360-ct)%360,cm=((currentRotation%360)+360)%360,ex=(tg-cm+360)%360,fs=6+secureRandomInt(4);
      currentRotation+=fs*360+ex;canvas.style.transitionDuration=`${THOI_GIAN_QUAY}ms`;canvas.style.transform=`rotate(${currentRotation}deg)`;
      setTimeout(()=>{
        isSpinning=false;spinBtn.disabled=false;centerBtn.disabled=false;clearInterval(quayInterval);playKetQuaSound();
        const win=entries[w];results.unshift(win);updateResults();winnerName.textContent=win;winnerModal.classList.add("show");
      },THOI_GIAN_QUAY);
    }
    function updateResults(){resultCount.textContent=results.length;resultsBox.innerHTML=results.length===0?"Chưa có kết quả nào.":results.map((t,i)=>`<div class="result-item">${i+1}. ${escapeHTML(t)}</div>`).join("");saveToLocal();}
    function shuffleEntries(){if(entries.length<=1)return;for(let i=entries.length-1;i>0;i--){const j=secureRandomInt(i+1);[entries[i],entries[j]]=[entries[j],entries[i]];}input.value=entries.join("\n");updateEntries();}
    function sortEntries(){entries.sort((a,b)=>a.localeCompare(b,"vi"));input.value=entries.join("\n");updateEntries();}
    function clearEntries(){if(!confirm("Xóa toàn bộ mục?"))return;input.value="";updateEntries();}
    function removeWinner(){if(lastWinnerIndex===null)return;entries.splice(lastWinnerIndex,1);input.value=entries.join("\n");lastWinnerIndex=null;updateEntries();closeModal();}
    function closeModal(){winnerModal.classList.remove("show");}
    function escapeHTML(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
    document.addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();spinWheel();}if(e.code==="Escape"){closeModal();closeShareModal();}});
    loadFromShareLink();if(!window.location.search.includes("list="))loadFromLocal();updateEntries();input.addEventListener("input",updateEntries);
  </script>
</body>
</html>
